version: 1
frontend:
  runtime:
    nodejs: 22
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - npm ci --prefix ../..
    build:
      commands:
        - node ../../tooling/write-amplify-env.mjs reference
        - npm run build --workspace=apps/reference --prefix ../..
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - ../../node_modules/**/*
      - .next/cache/**/*
