version: 1
frontend:
  runtime:
    nodejs: 22
  phases:
    preBuild:
      commands:
        - node -v
        - npm ci
    build:
      commands:
        - env | grep -e NEXT_PUBLIC_SITE_URL >> .env.production || true
        - env | grep -e NEXTAUTH_TABLE >> .env.production
        - 'test "${BACKGROUND_JOBS_ENABLED:-}" = "true" || test "${BACKGROUND_JOBS_ENABLED:-}" = "false"'
        - env | grep -e '^BACKGROUND_JOBS_ENABLED=' >> .env.production
        - 'test -n "${BACKGROUND_JOBS_TABLE:-}"'
        - env | grep -e '^BACKGROUND_JOBS_TABLE=' >> .env.production
        - 'test "${BACKGROUND_JOBS_QUEUE_URL:-}" != ""'
        - env | grep -e '^BACKGROUND_JOBS_QUEUE_URL=' >> .env.production
        - 'test "${#BACKGROUND_JOBS_INTERNAL_SECRET}" -ge 32'
        - env | grep -e '^BACKGROUND_JOBS_INTERNAL_SECRET=' >> .env.production
        - 'test "${BACKGROUND_JOB_SMOKE_ALLOWLIST:-}" = "paul@paulbrigner.com,div@accrediv.com"'
        - env | grep -e '^BACKGROUND_JOB_SMOKE_ALLOWLIST=' >> .env.production
        - env | grep -e BETTER_AUTH_URL >> .env.production || true
        - 'test "${#BETTER_AUTH_SECRET}" -ge 32'
        - env | grep -e BETTER_AUTH_SECRET >> .env.production
        - env | grep -e BETTER_AUTH_TRUSTED_ORIGINS >> .env.production || true
        - 'test "${#EMAIL_TRACKING_SECRET}" -ge 32'
        - env | grep -e '^EMAIL_TRACKING_SECRET=' >> .env.production
        - 'test -z "${EMAIL_TRACKING_SECRET_PREVIOUS:-}" || test "${#EMAIL_TRACKING_SECRET_PREVIOUS}" -ge 32'
        - 'test -z "${EMAIL_TRACKING_SECRET_PREVIOUS:-}" || test "${EMAIL_TRACKING_SECRET_PREVIOUS}" != "${EMAIL_TRACKING_SECRET}"'
        - env | grep -e '^EMAIL_TRACKING_SECRET_PREVIOUS=' >> .env.production || true
        - 'test "${EMAIL_TRANSPORT:-}" = "ses"'
        - env | grep -e EMAIL_TRANSPORT >> .env.production
        - env | grep -e REGION_AWS >> .env.production
        - 'test -z "${NEXT_PUBLIC_XMONITOR_ENABLED:-}" || test "${NEXT_PUBLIC_XMONITOR_ENABLED}" = "true" || test "${NEXT_PUBLIC_XMONITOR_ENABLED}" = "false"'
        - env | grep -e '^NEXT_PUBLIC_XMONITOR_ENABLED=' >> .env.production || true
        - 'test "${NEXT_PUBLIC_XMONITOR_ENABLED:-false}" != "true" || test -n "${XMONITOR_READ_API_BASE_URL:-}"'
        - 'test "${NEXT_PUBLIC_XMONITOR_ENABLED:-false}" != "true" || case "${XMONITOR_READ_API_BASE_URL}" in https://*) true ;; *) false ;; esac'
        - 'test "${NEXT_PUBLIC_XMONITOR_ENABLED:-false}" != "true" || test -n "${XMONITOR_READ_CLIENT_ID:-}"'
        - 'test "${NEXT_PUBLIC_XMONITOR_ENABLED:-false}" != "true" || test "${#XMONITOR_READ_CLIENT_SECRET}" -ge 32'
        - env | grep -e '^XMONITOR_READ_API_BASE_URL=' >> .env.production || true
        - env | grep -e '^XMONITOR_READ_CLIENT_ID=' >> .env.production || true
        - env | grep -e '^XMONITOR_READ_CLIENT_SECRET=' >> .env.production || true
        - env | grep -e '^XMONITOR_READ_TIMEOUT_MS=' >> .env.production || true
        - env | grep -e X_BEARER_TOKEN >> .env.production
        - env | grep -e XMON_X_API_BEARER_TOKEN >> .env.production || true
        - env | grep -e X_API_BASE_URL >> .env.production || true
        - env | grep -e XMON_X_API_BASE_URL >> .env.production || true
        - env | grep -e X_API_TIMEOUT_MS >> .env.production || true
        - env | grep -e X_PROOF_CHALLENGE_TTL_MINUTES >> .env.production || true
        - env | grep -e X_PROOF_RATE_LIMIT_WINDOW_MINUTES >> .env.production || true
        - env | grep -e X_PROOF_CHALLENGE_RATE_LIMIT >> .env.production || true
        - env | grep -e X_PROOF_VERIFY_RATE_LIMIT >> .env.production || true
        - env | grep -e X_PROOF_AUTOVERIFY_WINDOW_MINUTES >> .env.production || true
        - env | grep -e X_PROOF_AUTOVERIFY_BATCH_SIZE >> .env.production || true
        - env | grep -e X_PROOF_AUTOVERIFY_GROUP_SIZE >> .env.production || true
        - env | grep -e X_PROOF_AUTOVERIFY_MAX_ATTEMPTS >> .env.production || true
        - 'test "${#SOCIAL_PROOF_AUTOVERIFY_SECRET}" -ge 32'
        - env | grep -e '^SOCIAL_PROOF_AUTOVERIFY_SECRET=' >> .env.production
        - 'test -z "${SOCIAL_PROOF_AUTOVERIFY_SECRET_PREVIOUS:-}" || test "${#SOCIAL_PROOF_AUTOVERIFY_SECRET_PREVIOUS}" -ge 32'
        - 'test -z "${SOCIAL_PROOF_AUTOVERIFY_SECRET_PREVIOUS:-}" || test "${SOCIAL_PROOF_AUTOVERIFY_SECRET_PREVIOUS}" != "${SOCIAL_PROOF_AUTOVERIFY_SECRET}"'
        - env | grep -e '^SOCIAL_PROOF_AUTOVERIFY_SECRET_PREVIOUS=' >> .env.production || true
        - env | grep -e MEMBERSHIP_PROOF_RETENTION_POLICY >> .env.production || true
        - env | grep -e EMAIL_FROM >> .env.production
        - env | grep -e CLOUDFRONT_DOMAIN >> .env.production || true
        - env | grep -e KEY_PAIR_ID >> .env.production || true
        - env | grep -e PRIVATE_KEY_SECRET >> .env.production || true
        - env | grep -e POLICY_UPDATE_UPLOAD_BUCKET >> .env.production || true
        - env | grep -e POLICY_UPDATE_UPLOAD_PREFIX >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
