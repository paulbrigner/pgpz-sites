version: 1
applications:
  - appRoot: apps/community
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm install 22
            - nvm use 22
            - node -v
            - npm ci
        build:
          commands:
            - node tooling/write-amplify-env.mjs community
            - npm run build:community
      artifacts:
        baseDirectory: apps/community/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/community/.next/cache/**/*
  - appRoot: apps/coalition
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm install 22
            - nvm use 22
            - node -v
            - npm ci
        build:
          commands:
            - node tooling/write-amplify-env.mjs coalition
            - npm run build:coalition
      artifacts:
        baseDirectory: apps/coalition/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/coalition/.next/cache/**/*
  - appRoot: apps/reference
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm install 22
            - nvm use 22
            - node -v
            - npm ci
        build:
          commands:
            - node tooling/write-amplify-env.mjs reference
            - npm run build:reference
      artifacts:
        baseDirectory: apps/reference/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/reference/.next/cache/**/*
