name: Monorepo CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: monorepo-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install workspace dependencies
        run: npm ci
      - name: Reject moderate or higher production dependency advisories
        run: npm run audit:production
      - name: Verify imported history baseline
        run: npm run history:verify
      - name: Enforce sibling parity
        run: npm run parity:check
      - name: Enforce workspace import and dependency boundaries
        run: npm run boundaries:check
      - name: Typecheck all workspaces
        run: npm run typecheck
      - name: Run tests
        run: npm test
      - name: Run DynamoDB adapter integration contracts
        env:
          PGPZ_DYNAMODB_INTEGRATION_ENDPOINT: http://127.0.0.1:8000
          PGPZ_DYNAMODB_INTEGRATION_REQUIRED: '1'
        run: npm run test:integration --workspace=@pgpz/auth-dynamodb
      - name: Run linters
        run: npm run lint

  build:
    name: Build ${{ matrix.application }}
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        application:
          - community
          - coalition
          - reference
    env:
      AWS_EC2_METADATA_DISABLED: 'true'
      BACKGROUND_JOBS_ENABLED: 'false'
      BACKGROUND_JOBS_INTERNAL_SECRET: ci-only-background-jobs-secret-at-least-32-characters
      BACKGROUND_JOBS_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/000000000000/pgpz-ci-background-jobs
      BACKGROUND_JOBS_TABLE: PGPZCiBackgroundJobs
      BACKGROUND_JOB_SMOKE_ALLOWLIST: paul@paulbrigner.com,div@accrediv.com
      BETTER_AUTH_SECRET: ci-only-better-auth-secret-at-least-32-characters
      BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:3000
      BETTER_AUTH_URL: http://localhost:3000
      EMAIL_TRACKING_SECRET: ci-only-email-tracking-secret-at-least-32-characters
      EMAIL_TRANSPORT: ses
      EMAIL_FROM: PGPZ CI <ci@example.invalid>
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      REGION_AWS: us-east-1
      SOCIAL_PROOF_AUTOVERIFY_SECRET: ci-only-autoverify-secret-at-least-32-characters
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install workspace dependencies
        run: npm ci
      - name: Materialize the branded application environment
        if: matrix.application != 'reference'
        env:
          NEXTAUTH_TABLE: PGPZCiNextAuth
          X_BEARER_TOKEN: ci-only-x-token
        run: node tooling/write-amplify-env.mjs ${{ matrix.application }}
      - name: Build branded application
        if: matrix.application != 'reference'
        env:
          NEXTAUTH_TABLE: PGPZCiNextAuth
          X_BEARER_TOKEN: ci-only-x-token
        run: npm run build:${{ matrix.application }}
      - name: Materialize the isolated reference environment
        if: matrix.application == 'reference'
        env:
          DYNAMODB_TABLE: PGPZReferenceCi
          EMAIL_DELIVERY_MODE: disabled
          REFERENCE_DEPLOYMENT_MODE: demo
          ZEC_SHELF_PARTITION_KEY: REFERENCE#CI
        run: node tooling/write-amplify-env.mjs reference
      - name: Build reference application
        if: matrix.application == 'reference'
        env:
          DYNAMODB_TABLE: PGPZReferenceCi
          EMAIL_DELIVERY_MODE: disabled
          REFERENCE_DEPLOYMENT_MODE: demo
          ZEC_SHELF_PARTITION_KEY: REFERENCE#CI
        run: npm run build:reference

  browser-tests:
    name: Browser journeys
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install workspace dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run critical browser journeys
        run: npm run test:e2e
